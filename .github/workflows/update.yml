name: Update Tournament Data

on:
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch tournaments from Challonge
        env:
          CHALLONGE_API_KEY: ${{ secrets.CHALLONGE_API_KEY }}
        run: python fetch_tournaments.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tournaments.json leaderboard.json
          git diff --staged --quiet || git commit -m "Update tournament data"
          git push
