<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocol: DUST Tournaments</title>
<style>
  :root {
    --bg: #0d0f14;
    --card: #161a22;
    --accent: #ff8c2b;
    --text: #e6e6e6;
    --muted: #9aa0ab;
    --border: #2a2f3a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #2a1a0d, #0d0f14);
    padding: 14px 20px;
    border-bottom: 2px solid var(--accent);
    display: flex;
    align-items: center;
    gap: 20px;
    max-width: 1000px;
    margin: 0 auto 100px auto;
    position: relative;
    overflow: visible;
  }
  header img.logo {
    height: 200px;
    width: 200px;
    border-radius: 10px;
    object-fit: cover;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  header .title-block {
    position: relative;
    z-index: 2;
  }
  header .title-block h1 {
    font-size: 2rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
  }
  header .title-block p {
    color: var(--muted);
    margin-top: 6px;
  }
  .controls {
    max-width: 1000px;
    margin: 20px auto 0;
    padding: 0 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
  }
  .controls input, .controls select, .controls button {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 0.95rem;
  }
  .controls button {
    background: var(--accent);
    border: none;
    cursor: pointer;
    font-weight: bold;
  }
  .controls button:hover { background: #ff5c5c; }
  main {
    max-width: 1000px;
    margin: 30px auto;
    padding: 0 20px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    transition: transform 0.15s, border-color 0.15s;
  }
  .card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
  }
  .card h3 {
    font-size: 1.1rem;
    margin-bottom: 8px;
  }
  .card a { color: var(--text); text-decoration: none; }
  .card a:hover { color: var(--accent); }
  .meta {
    color: var(--muted);
    font-size: 0.85rem;
    margin: 4px 0;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: bold;
    text-transform: uppercase;
    margin-top: 8px;
  }
  .badge.pending { background: #3a4a2a; color: #b6e08a; }
  .badge.underway { background: #4a3a2a; color: #f0b86a; }
  .badge.complete { background: #2a3a4a; color: #8ac4f0; }
  .badge.unknown { background: #3a3a3a; color: #ccc; }
  .winner {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 0.9rem;
  }
  .winner-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--accent);
    flex-shrink: 0;
  }
  .winner-avatar-placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent);
    color: #1a0f00;
    font-weight: bold;
  }
  .status-msg {
    text-align: center;
    color: var(--muted);
    padding: 40px 0;
  }
  .error {
    color: var(--accent);
  }
  footer {
    text-align: center;
    padding: 30px;
    color: var(--muted);
    font-size: 0.85rem;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }
  footer a { color: var(--accent); }
</style>
</head>
<body>

<header>
  <img src="ProtocolDUSTLogo.png" alt="Protocol: DUST Logo" class="logo">
  <div class="title-block">
    <h1>Protocol: DUST Tournaments</h1>
    <p>Community Tournament Hub — powered by Challonge</p>
  </div>
</header>

<div class="controls">
  <input type="text" id="searchBox" placeholder="Search tournaments...">
  <select id="stateFilter">
    <option value="all">All States</option>
    <option value="pending">Upcoming</option>
    <option value="underway">In Progress</option>
    <option value="complete">Completed</option>
  </select>
  <button onclick="loadTournaments()">Refresh</button>
</div>

<main>
  <div id="results" class="status-msg">Loading tournaments...</div>
</main>

<footer>
  Data from <a href="https://challonge.com" target="_blank">Challonge</a> &middot;
  Hosted on GitHub Pages
</footer>

<script>
/*
  CONFIGURATION
  -------------
  Challonge's public API requires an API key, which cannot be safely
  exposed in a static front-end site. To make this work without a
  backend, this page expects a small JSON file (tournaments.json)
  generated ahead of time (e.g. via a GitHub Action) that lists
  tournaments matching the game "DUST: Virtual Combat".

  See the included fetch_tournaments.py script and the GitHub Actions
  workflow (.github/workflows/update.yml) for how to auto-generate
  tournaments.json on a schedule.
*/

const GAME_NAME = "DUST: Virtual Combat";
let allTournaments = [];

async function loadTournaments() {
  const resultsEl = document.getElementById('results');
  resultsEl.className = 'status-msg';
  resultsEl.textContent = 'Loading tournaments...';

  try {
    const res = await fetch('tournaments.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('tournaments.json not found');
    const data = await res.json();
    allTournaments = data.tournaments || [];
    render();
  } catch (err) {
    resultsEl.innerHTML = `
      <div class="error">
        Could not load tournament data (${err.message}).<br><br>
        This page reads from a local <code>tournaments.json</code> file
        generated by the included fetch script.<br>
        Run <code>fetch_tournaments.py</code> with your Challonge API key
        and commit the resulting tournaments.json to this repo.
      </div>`;
  }
}

function render() {
  const resultsEl = document.getElementById('results');
  const search = document.getElementById('searchBox').value.toLowerCase();
  const stateFilter = document.getElementById('stateFilter').value;

  let filtered = allTournaments.filter(t => {
    const matchesSearch = t.name.toLowerCase().includes(search);
    const matchesState = stateFilter === 'all' || t.state === stateFilter;
    return matchesSearch && matchesState;
  });

  if (filtered.length === 0) {
    resultsEl.className = 'status-msg';
    resultsEl.textContent = `No tournaments found for "${GAME_NAME}".`;
    return;
  }

  resultsEl.className = 'grid';
  resultsEl.innerHTML = filtered.map(t => {
    const state = t.state || 'unknown';
    const badgeLabel = {
      pending: 'Upcoming',
      underway: 'In Progress',
      complete: 'Completed'
    }[state] || 'Unknown';

    const startDate = t.start_at
      ? new Date(t.start_at).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })
      : 'TBD';

    let winnerHtml = '';
    if (state === 'complete' && t.winner) {
      const avatar = t.winner.avatar_url
        ? `<img src="${t.winner.avatar_url}" alt="${escapeHtml(t.winner.name)}" class="winner-avatar">`
        : `<div class="winner-avatar winner-avatar-placeholder">${escapeHtml((t.winner.name || '?')[0].toUpperCase())}</div>`;
      winnerHtml = `
        <div class="winner">
          ${avatar}
          <span>Winner: <strong>${escapeHtml(t.winner.name)}</strong></span>
        </div>`;
    }

    return `
      <div class="card">
        <h3><a href="${t.full_challonge_url}" target="_blank">${escapeHtml(t.name)}</a></h3>
        <div class="meta">Participants: ${t.participants_count ?? '—'}</div>
        <div class="meta">Start: ${startDate}</div>
        <span class="badge ${state}">${badgeLabel}</span>
        ${winnerHtml}
      </div>`;
  }).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById('searchBox').addEventListener('input', render);
document.getElementById('stateFilter').addEventListener('change', render);

loadTournaments();
</script>

</body>
</html>
